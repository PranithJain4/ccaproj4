<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Site</title>
    <style>
        /* This is where the magic happens (CSS) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .welcome-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 {
            color: #2d3436;
            margin-bottom: 0.5rem;
        }
        p {
            color: #636e72;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 10px 25px;
            background-color: #0984e3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #74b9ff;
        }
    </style>
</head>
<body>

    <div class="welcome-card">
        <h1>Hello there! 👋</h1>
        <p>Welcome to my brand new corner of the internet. I'm glad you made it here. Stay a while and look around!</p>
        <a href="#" class="btn">Explore More</a>
    </div>

</body>
</html>
